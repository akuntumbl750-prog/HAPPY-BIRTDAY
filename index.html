<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Kia</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(135deg, #f3e5ff 0%, #ffffff 100%);
    min-height: 100vh;
    overflow: hidden;
}

.handwriting {
    font-family: 'Dancing Script', cursive;
}

.popup {
    animation: fadeIn 1.2s ease-out forwards;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}

.continue-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(255, 182, 193, 0.5);
}
</style>
</head>

<body class="flex items-center justify-center relative">

<!-- LEFT IMAGE -->
<img src="Pink%20Teddy%20Bear%20Ballon.png"
     class="absolute left-5 top-1/2 -translate-y-1/2 w-32">

<!-- RIGHT IMAGE -->
<img src="Pink%20Teddy%20Bear%20Rose.png"
     class="absolute right-5 top-1/2 -translate-y-1/2 w-32">

<!-- SLIDE 1 -->
<div id="slide1" class="popup bg-white/90 rounded-xl shadow-xl p-8 text-center max-w-md">
    
    <h1 class="handwriting text-4xl text-pink-500 mb-4">
        🎂 Happy Birthday, Kia
    </h1>

    <p class="text-gray-600 mb-6">
        My favorite person from Surakarta, Central Java.
    </p>

    <button id="continueBtn"
        class="continue-btn bg-pink-400 text-white px-6 py-2 rounded-full">
        Continue
    </button>
</div>

<!-- SLIDE 2 -->
<div id="slide2" class="hidden bg-white/90 rounded-xl shadow-xl p-8 max-w-xl text-left">
    
    <div id="text" class="text-gray-700 leading-relaxed whitespace-pre-wrap h-96 overflow-y-auto"></div>

    <audio id="song" loop preload="auto">
        <source src="Happy Birtday.mp3" type="audio/mpeg">
    </audio>

    <button id="playMusicBtn" class="mt-4 text-sm text-pink-500 underline hidden">
        Tap here if music doesn't play 🎵
    </button>

</div>

<script>
const message = `Selamat ulang tahun yang ke-20 sweetie<3, terlalu awal ya? maaf, hanya ini yang bisa Iqbal kasih sebagai hadiah sebelum bener-bener pergi. Kamu udah hebat, bertahan sejauh ini dengan segala hal buruk yang datang bergantian, kamu tetap berdiri meski Iqbal tau itu capek banget...

Jangan sedih ya? Iqbal udah berusaha semampu Iqbal buat bertahan, tapi... Mental Iqbal cape dan udah gakuat sama sikap kamu...

However, inikan ucapan selamat ulang tahun buat kamu, kenapa jadi sedih sih!!! KOCAK... ahh sudahlah, terus tumbuh jadi wanita kuat dan 'Produktif', ya? sesekali kalau capek berenti dulu buat istirahat, jangan di paksain terus, dengerin tubuh kamu...

Iqbal cuman mau bilang, kamu adalah wanita terhebat yang pernah Iqbal kenal selain Mama. Terima kasih ya?

Berbahagialah sayang, karna sekarang... kamu gaperlu bales chat Iqbal lagi karna kasian hihi, have a nice day until your birthday, sweetie<3`;

function typeWriter(text, element, speed = 35) {
    let i = 0;

    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            element.scrollTop = element.scrollHeight;
            setTimeout(typing, speed);
        }
    }

    typing();
}

document.getElementById("continueBtn").addEventListener("click", function () {

    document.getElementById("slide1").classList.add("hidden");
    document.getElementById("slide2").classList.remove("hidden");

    const song = document.getElementById("song");
    const fallbackBtn = document.getElementById("playMusicBtn");

    song.volume = 0.5;

    song.play()
        .then(() => {})
        .catch(() => {
            fallbackBtn.classList.remove("hidden");
        });

    fallbackBtn.addEventListener("click", () => {
        song.play();
    });

    typeWriter(message, document.getElementById("text"));
});
</script>

</body>
</html>
